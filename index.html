<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyElement3D Market</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #333;
            color: #fff;
            padding: 1rem;
            text-align: center;
        }
        .container {
            padding: 2rem;
        }
        .product {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 1rem;
            margin: 1rem 0;
            background: #fff;
        }
        .product h2 {
            margin: 0 0 1rem;
        }
        .product button {
            background-color: #28a745;
            color: #fff;
            border: none;
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-radius: 3px;
        }
        .product button:hover {
            background-color: #218838;
        }
        .cart {
            margin-top: 2rem;
            padding: 1rem;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .cart h2 {
            margin-top: 0;
        }
        .checkout {
            margin-top: 1rem;
            background-color: #007bff;
            color: #fff;
            border: none;
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-radius: 3px;
        }
        .checkout:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <header>
        <h1>PolyElement3D Market</h1>
    </header>
    <div class="container">
        <div class="product">
            <h2>Infinity Cube</h2>
            <p>$5</p>
            <button>Add to Cart</button>
        </div>
        <div class="product">
            <h2>Spiral Fidget</h2>
            <p>$4.50</p>
            <button>Add to Cart</button>
        </div>
        <div class="cart">
            <h2>Shopping Cart</h2>
            <p>No items in cart.</p>
            <button class="checkout">Checkout</button>
        </div>
    </div>
</body>
</html>
