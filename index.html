<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyElement3D | Premium Fabrication</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    
    <script src="https://js.stripe.com/v3/"></script>

    <style>
        :root {
            --neon: #00f2ff;
            --pink: #ff00e6;
            --purple: #7000ff;
            --dark: #050505;
        }

        body {
            background-color: var(--dark);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #050505 100%);
        }

        /* --- EFFECTS & ANIMATIONS --- */
        .glow-cursor {
            position: fixed;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.07) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }

        .brand-glitch {
            font-family: 'Syncopate', sans-serif;
            color: var(--neon);
            text-shadow: 2px 2px var(--pink);
            letter-spacing: 4px;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 2px var(--pink); }
            50% { text-shadow: -2px -2px var(--purple); }
            100% { text-shadow: 2px 2px var(--pink); }
        }

        /* --- UI COMPONENTS --- */
        .glass-nav {
            background: rgba(0,0,0,0.7) !important;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
        }

        .product-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--neon);
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
        }

        .img-wrapper {
            height: 240px;
            overflow: hidden;
            position: relative;
        }

        .img-wrapper img {
            width: 100%; height: 100%; object-fit: cover;
            transition: 0.8s ease;
        }

        .product-card:hover img { transform: scale(1.1); filter: brightness(1.2); }

        .btn-checkout {
            background: linear-gradient(45deg, var(--neon), var(--purple));
            border: none; color: white; font-weight: bold;
            border-radius: 50px; transition: 0.3s;
        }

        .btn-checkout:hover {
            box-shadow: 0 0 25px var(--neon);
            transform: scale(1.05); color: white;
        }

        /* --- CART MODAL --- */
        .modal-content {
            background: #0a0a0a; border: 1px solid var(--neon);
            border-radius: 30px; color: white;
        }

        .cart-badge { background: var(--pink); box-shadow: 0 0 10px var(--pink); }
    </style>
</head>
<body>

    <div class="glow-cursor" id="cursor"></div>

    <nav class="navbar navbar-dark glass-nav fixed-top py-3">
        <div class="container">
            <a class="navbar-brand brand-glitch" href="#">PolyElement3D</a>
            <button class="btn btn-outline-info rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#cartModal">
                CART [<span id="cart-count">0</span>]
            </button>
        </div>
    </nav>

    <header class="container text-center py-5 mt-5">
        <h1 class="display-2 fw-bold" data-aos="zoom-out">HIGH_GRADE_FABRICATION</h1>
        <p class="lead opacity-75" data-aos="fade-up">Professional PLA+ Prints • Real-Time Ordering • Gold Coast</p>
    </header>

    <main class="container mb-5">
        <div id="shop-grid" class="row row-cols-1 row-cols-md-3 g-5">
            </div>
    </main>

    <div class="modal fade" id="cartModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-4">
                <div class="modal-header border-0">
                    <h5 class="modal-title font-monospace">ACTIVE_ORDER_MANIFEST</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="cart-display">
                    </div>
                <div class="modal-footer border-0 flex-column">
                    <div class="d-flex justify-content-between w-100 mb-4 h4">
                        <span>SUBTOTAL:</span>
                        <span id="cart-total" class="text-info">$0.00</span>
                    </div>
                    <button id="real-checkout-btn" class="btn btn-checkout w-100 py-3">PROCESS DEBIT CARD</button>
                    <p class="small opacity-50 mt-3 text-center">Secure encryption provided by Stripe.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script>
        AOS.init({ duration: 1000, once: true });

        // Apply your Real Publishable Key
        const stripe = Stripe('pk_test_51T8egQIbBH5Ek7fOIUMkuPg8ZBzSIngBkxQTJuxAUxb66TteiyU6DRcCShn0LhRkhGvbPyZkwmbANgDXFYg46JFj00D0KPBafw');
        
        // Mouse follow effect
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        let cart = JSON.parse(localStorage.getItem('pe3d_v1_cart')) || [];

        async function initShop() {
            try {
                const response = await fetch('products.json');
                const products = await response.json();
                
                const grid = document.getElementById('shop-grid');
                grid.innerHTML = products.map((p, i) => `
                    <div class="col" data-aos="fade-up" data-aos-delay="${i * 100}">
                        <div class="product-card h-100 p-3">
                            <div class="img-wrapper rounded-4 mb-3">
                                <img src="${p.image}" alt="${p.name}">
                            </div>
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <span class="badge bg-dark border border-info text-info">PLA+</span>
                                <span class="h5 mb-0 text-white">$${p.price.toFixed(2)}</span>
                            </div>
                            <h3 class="h4 fw-bold">${p.name}</h3>
                            <p class="small text-secondary flex-grow-1">${p.description}</p>
                            <button class="btn btn-checkout w-100 mt-3" onclick="addToCart(${p.id}, '${p.name}', ${p.price}, '${p.stripe_price_id}')">
                                ADD TO CART
                            </button>
                        </div>
                    </div>
                `).join('');
                updateCartUI();
            } catch (err) {
                console.error("Error loading products. Ensure products.json exists!");
            }
        }

        function addToCart(id, name, price, priceId) {
            const match = cart.find(i => i.id === id);
            if (match) match.qty++;
            else cart.push({ id, name, price, priceId, qty: 1 });
            updateCartUI();
        }

        function updateCartUI() {
            const display = document.getElementById('cart-display');
            const totalDisplay = document.getElementById('cart-total');
            const countDisplay = document.getElementById('cart-count');
            
            let total = 0, count = 0;
            display.innerHTML = cart.length ? '' : '<p class="text-center opacity-25 py-4">No items in manifest.</p>';

            cart.forEach((item, idx) => {
                total += item.price * item.qty;
                count += item.qty;
                display.innerHTML += `
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <div>
                            <span class="fw-bold">${item.name}</span><br>
                            <small class="text-info">$${item.price} x ${item.qty}</small>
                        </div>
                        <button class="btn btn-sm text-danger" onclick="removeItem(${idx})">REMOVE</button>
                    </div>`;
            });

            totalDisplay.innerText = `$${total.toFixed(2)}`;
            countDisplay.innerText = count;
            localStorage.setItem('pe3d_v1_cart', JSON.stringify(cart));
        }

        function removeItem(idx) { cart.splice(idx, 1); updateCartUI(); }

        // --- REAL STRIPE CHECKOUT ---
        document.getElementById('real-checkout-btn').addEventListener('click', async () => {
            if (cart.length === 0) return alert("Add items to your order first.");

            // Convert our cart into Stripe's format
            const stripeItems = cart.map(item => ({
                price: item.priceId, 
                quantity: item.qty
            }));

            // Redirect to Stripe's secure payment page
            const { error } = await stripe.redirectToCheckout({
                lineItems: stripeItems,
                mode: 'payment',
                successUrl: window.location.origin + '/success.html',
                cancelUrl: window.location.origin + '/index.html',
            });

            if (error) {
                alert("Stripe Error: " + error.message);
            }
        });

        initShop();
    </script>
</body>
</html>
